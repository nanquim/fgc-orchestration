apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-db
  template:
    metadata:
      labels:
        app: payments-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: paymentsdb
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payments-api-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: payments-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: payments-db-data
          persistentVolumeClaim:
            claimName: payments-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: payments-db-service
spec:
  selector:
    app: payments-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: payments-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
